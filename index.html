<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reviews — Rideekanda Forest Monastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4ede0;
    --bg-deep: #ece3d1;
    --card: #fdfbf6;
    --ink: #1f1a14;
    --ink-soft: #4a4034;
    --muted: #8a7d68;
    --line: #e6dcc6;
    --accent: #2d4a32;
    --accent-soft: #5b7a5f;
    --gold: #c08a3e;
    --star: #e6a93b;
    --shadow-sm: 0 1px 2px rgba(57, 44, 22, 0.04), 0 0 0 1px rgba(57, 44, 22, 0.04);
    --shadow-md: 0 12px 32px -16px rgba(57, 44, 22, 0.18), 0 2px 6px -2px rgba(57, 44, 22, 0.06), 0 0 0 1px rgba(57, 44, 22, 0.04);
    --serif: "Cormorant Garamond", "Cormorant", Georgia, serif;
    --sans: "Manrope", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  /* Subtle paper texture */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(192, 138, 62, 0.04), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(45, 74, 50, 0.04), transparent 50%);
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* Loading state */
  .boot {
    min-height: 100vh;
    display: grid;
    place-items: center;
    color: var(--muted);
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
  }
  .boot .lotus {
    width: 88px; height: auto; opacity: 0.6; margin: 0 auto 16px; display: block;
    animation: breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; transform: scale(0.96); }
    50% { opacity: 0.85; transform: scale(1.04); }
  }
</style>
</head>
<body>
<div id="root">
  <div class="boot">
    <div>
      <img class="lotus" src="assets/lotus.png" alt="" />
      a moment of stillness…
    </div>
  </div>
</div>
